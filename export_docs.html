        const mdWalkthrough = `# Strike CRM — Payment Data Sync Walkthrough
**Date:** April 29, 2026

---

## What Was Broken

The CRM had three separate but related problems all causing the same symptom: **revenue numbers were wrong and inconsistent across the system.**

### Problem 1 — Wrong Rep Attribution on 218 Payments
When payment records were bulk-imported from the old Google Sheet, the system automatically stamped every single payment with **Michael's user ID** (the importer's account) instead of the actual sales rep who closed the deal.

**Effect:** Filtering payments by "Maison Mohamed" in the Payments tab showed far fewer payments than she actually owned. The Dashboard's rep performance numbers were also wrong because they were reading the same bad IDs.

### Problem 2 — Sales Name Filter Breaking After Resync
The Payments tab filter dropdown uses a **canonical name** (e.g. \`"Maison Mohamed"\`) built via name-alias mapping. But the filter comparison was using a raw lookup that returned the **profile name** (e.g. \`"Maison Mohmed"\` — a typo in her user profile).

\`"maison mohmed"\` ≠ \`"maison mohamed"\` → payments silently disappeared from the filter.

**Effect:** After the first resync attempt fixed the IDs, Maison went from showing all her payments to showing only 1. This caused the user to rightly restore from backup before proceeding.

### Problem 3 — "Unknown" in Recorded By Column
Payments imported from the old system had no \`recordedBy\` user ID set (or had \`"system-import"\` as a placeholder). The Payments table displayed **"Unknown"** in the "Recorded By" column for those rows.

---

## What Was Fixed

### Fix 1 — Resync Payments Tool (RepID Attribution)
**File:** \`src/components/ResyncPayments.tsx\`

The tool was updated to:
- Store the **canonical name** (\`"Maison Mohamed"\`) in \`salesName\` when writing to Firestore, instead of the raw user profile name (\`"Maison Mohmed"\`)
- Same canonical logic applied to backfill records

**Result:** 218 payment records now have the correct \`sales_rep_id\` pointing to the actual rep who owns each client.

---

### Fix 2 — Payments Filter (Canonical Name Matching)
**File:** \`src/Payments.tsx\`

The \`toCanonical()\` function was extracted from inside a local \`useMemo\` to **module level**, making it available everywhere in the file. The sales name filter now applies canonicalisation to **both sides** of the comparison:

\`\`\`
Before:  "maison mohmed"  ≠  "maison mohamed"  → ❌ filtered out
After:   toCanonical("maison mohmed")  =  toCanonical("maison mohamed")
         "Maison Mohamed"              =  "Maison Mohamed"  → ✅ matches
\`\`\`

**This fix applies to every rep** — including any new rep added in the future. Unknown names pass through unchanged, so no manual mapping is needed for new staff.

---

### Fix 3 — "Recorded By: Unknown" Default
**File:** \`src/Payments.tsx\`

The "Recorded By" column now uses a three-tier fallback:

| Priority | Source | Example |
|---|---|---|
| 1st | Find user by \`recordedBy\` ID | \`"Sama Hany"\` |
| 2nd | Use \`recordedByName\` field if stored | \`"Atef Strike"\` |
| 3rd | Find "Atef Strike" in users list | \`"Atef Strike"\` |

All imported payments that previously showed **"Unknown"** now correctly display **"Atef Strike"** as the responsible manager.

---

### Fix 4 — Skip Backup Option in Resync Tool
**File:** \`src/components/ResyncPayments.tsx\`

A subtle **"Skip backup — I already have one / I understand the risk"** link was added to the backup step, allowing the tool to be used quickly when a backup already exists without being forced to download another one.

---

## End Result

| Metric | Before | After |
|---|---|---|
| Payments attributed to correct rep | ❌ All stamped as Michael | ✅ 218 fixed to correct reps |
| Maison's payments visible in filter | ❌ 1 showing | ✅ 42 payments, 178,700 LE |
| "Recorded By" on imported records | ❌ "Unknown" | ✅ "Atef Strike" |
| Filter resilience to name typos | ❌ Exact match only | ✅ Canonical match for all reps |
| Skip backup in resync | ❌ Not available | ✅ Skip link added |

> [!IMPORTANT]
> The Resync Payments tool is now the **standard fix** for any future imports that result in misattributed payments. Run it from **Members → Resync Payments** whenever a bulk import is done.`;

This document provides a comprehensive overview of the Strike Boxing CRM architecture, data models, and the exact relationships between the various Firestore collections and React contexts.

---

## 1. High-Level System Flow

The application is a single-page React app (Vite) interacting directly with Firebase Firestore. Global state is managed using React Context and custom hooks.

\`\`\`mermaid
flowchart TD
    UI[React Components / UI] --> Hooks[Custom Data Hooks]
    Hooks --> Context[Global Contexts]
    Context --> Services[Firebase Services]
    Services --- Firestore[(Firestore Database)]
    Services --- Auth[(Firebase Auth)]
    
    subgraph Custom Hooks Layer
      useClients
      usePayments
      useTasks
      useAttendance
      usePTSessions
    end

    subgraph Context Layer
      AppContext
      AuthContext
      SettingsContext
    end
\`\`\`

---

## 2. Core Data Architecture & Entity Links

The CRM uses a NoSQL document database (Firestore) with denormalized fields for fast reads, but relies on explicit ID links for data integrity.

### Entity Relationship Diagram (ERD)

\`\`\`mermaid
erDiagram
    USERS ||--o{ CLIENTS : "assignedTo"
    USERS ||--o{ PAYMENTS : "sales_rep_id"
    USERS ||--o{ TASKS : "assignedTo"
    USERS ||--o{ PT_SESSIONS : "trainerId"
    
    CLIENTS ||--o{ PAYMENTS : "clientId"
    CLIENTS ||--o{ ATTENDANCE : "clientId"
    CLIENTS ||--o{ PT_SESSIONS : "clientId"
    CLIENTS ||--o{ TASKS : "clientId"
    
    USERS {
        string id PK
        string role
        string email
        string name
        string branch
    }
    
    CLIENTS {
        string id PK
        string name
        string status
        string assignedTo FK
        string salesName
        string memberId
    }
    
    PAYMENTS {
        string id PK
        string clientId FK
        string sales_rep_id FK
        string recordedBy FK
        number amount
        string method
        string packageType
    }
    
    ATTENDANCE {
        string id PK
        string clientId FK
        string recordedBy FK
        string branch
        string date
    }
\`\`\`

### Key Mapping Rules

1. **Client to Sales Rep (\`Clients.assignedTo\` -> \`Users.id\`)**
   - Drives lead distribution and visibility. Reps only see clients assigned to them.
2. **Payment to Sales Rep (\`Payments.sales_rep_id\` -> \`Users.id\`)**
   - **Critical link:** This drives the Dashboard performance metrics, Commission reports, and Payments tab filters. Historical data was fixed via the \`ResyncPayments\` tool to enforce this.
3. **Payment to Client (\`Payments.clientId\` -> \`Clients.id\`)**
   - Drives the payment history inside the member's profile.
4. **Attendance to Client (\`Attendance.clientId\` -> \`Clients.id\`)**
   - Deducts sessions from the client's \`sessionsRemaining\`.

---

## 3. The Sales & Revenue Lifecycle

This is the exact path a Lead takes to become a paying Member and how the revenue is attributed.

\`\`\`mermaid
sequenceDiagram
    participant Reception
    participant CRM_System
    participant Clients_DB
    participant Payments_DB
    participant Dashboard

    Reception->>CRM_System: Add New Lead / Member
    CRM_System->>Clients_DB: Create Client (Assigned to Rep X)
    
    Reception->>CRM_System: Record Payment (e.g. 5,000 LE)
    CRM_System->>Payments_DB: Create Payment (clientId, sales_rep_id = Rep X)
    CRM_System->>Clients_DB: Update Client (status='Active', deduct sessions)
    
    CRM_System->>Dashboard: Aggregate Revenue for Rep X
    Dashboard-->>Reception: Displays 5,000 LE for Rep X
\`\`\`

---

## 4. Name Resolution & Normalization

Because legacy data (from Google Sheets) often contained typos or variations of a person's name (e.g., "Maisoon", "Maison", "Maison Mohmed", "maisonmohmed6"), the system employs a **Canonical Name Resolution** pipeline.

\`\`\`mermaid
flowchart LR
    Raw[Raw Input / Firebase UID] --> Resolver{resolveUserDisplay}
    Resolver -- If UID --> DB[(Users Collection)]
    DB -- Returns Name --> Canonicalizer{toCanonical}
    Resolver -- If Name string --> Canonicalizer
    
    Canonicalizer -- Matches Alias --> Clean["Clean Name (e.g., 'Maison Mohamed')"]
    Canonicalizer -- No Match --> Pass["Raw Name"]
    
    Clean --> Filter[Filter Logic]
    Clean --> UI[UI Display]
\`\`\`

---

## 5. Security & Access Control

Roles dictate what a user can view and edit, controlled largely at the front-end view layer but supplemented by Firestore Security Rules.

\`\`\`mermaid
graph TD
    User((User)) --> RoleCheck{Role Check}
    RoleCheck -- super_admin / admin --> FullAccess[Full System Access]
    RoleCheck -- manager / sales_manager --> TeamAccess[View Team Data & Dashboard]
    RoleCheck -- sales_rep --> RestrictedAccess[View OWN Clients & Payments ONLY]
    RoleCheck -- coach --> CoachAccess[View PT Sessions & Attendance]
\`\`\`

**Key Boolean Flags on User Profile:**
- \`can_delete_payments\`: Granular control over financial deletion (mostly admin only).
- \`can_view_global_dashboard\`: Allows managers to see branch/company totals.
- \`can_delete_records\`: Granular control over client deletion.

---

## 6. Audit & History

To ensure accountability, the CRM logs destructive and critical update actions.

\`\`\`mermaid
flowchart LR
    User[User Action] --> Component[React Component]
    Component --> Action[Update/Delete Function]
    Action --> Target[(Target Collection)]
    Action --> AuditHook[auditService.logAction]
    AuditHook --> AuditDB[(audit_logs Collection)]
\`\`\`
- Tracks: Action (\`CREATE\`, \`UPDATE\`, \`DELETE\`), Entity (\`CLIENT\`, \`PAYMENT\`, etc.), the User ID, and a timestamp.`;
